<div class="container">
  <h1>Blogs</h1>
  <table class="table table-bordered">
    <thead>
      <tr>
        <th>#</th>
        <th>Title</th>
        <th>Description</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let blog of getBlogs()">
        <td>{{ blog.id }}</td>
        <td>{{ blog.title }}</td>
        <td>{{ blog.description }}</td>
        <td>
          <a href="#" class="btn btn-outline-danger">Delete</a>
          <a href="#" class="btn btn-outline-primary">Edit</a>
        </td>
      </tr>
    </tbody>
  </table>
</div>
