<!-- Contact Section -->
<section id="contact" class="contact section">

  <div class="container" data-aos="fade-up" data-aos-delay="100">

    @for (item of contactInfos; track $index) {
    <div class="mb-4" data-aos="fade-up" data-aos-delay="200">
      <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d96345.06604632532!2d28.943212708105474!3d41.008115699890794!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1str!2str!4v1784390981036!5m2!1str!2str"

        referrerpolicy="strict-origin-when-cross-origin"></iframe>
    </div><!-- End Google Maps -->
    }

    <div class="row gy-4">

      @for (item of contactInfos; track $index) {
      <div class="col-lg-4">

        <div class="info-item d-flex" data-aos="fade-up" data-aos-delay="300">
          <i class="bi bi-geo-alt flex-shrink-0"></i>
          <div>
            <h3>Address</h3>
            <p>{{item.address}}</p>
          </div>
        </div><!-- End Info Item -->

        <div class="info-item d-flex" data-aos="fade-up" data-aos-delay="400">
          <i class="bi bi-telephone flex-shrink-0"></i>
          <div>
            <h3>Call Us</h3>
            <p>{{item.phone}}</p>
          </div>
        </div><!-- End Info Item -->

        <div class="info-item d-flex" data-aos="fade-up" data-aos-delay="500">
          <i class="bi bi-envelope flex-shrink-0"></i>
          <div>
            <h3>Email Us</h3>
            <p>{{item.email}}</p>
          </div>
        </div><!-- End Info Item -->

      </div>
      }

      <div class="col-lg-8">
        <send-message></send-message>
      </div><!-- End Contact Form -->

    </div>

  </div>

</section><!-- /Contact Section -->
